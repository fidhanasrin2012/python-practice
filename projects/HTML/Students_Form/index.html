<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Student Registration Form</h1>

<form>

<label>Student Name</label><br>
<input type="text" placeholder="Enter your name" required><br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email" required><br><br>

<label>Phone Number</label><br>
<input type="tel" placeholder="Enter phone number"><br><br>

<label>Date of Birth</label><br>
<input type="date"><br><br>

<label>Gender</label><br>

<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other

<br><br>

<label>Department</label><br>

<select>
    <option>AI & DS</option>
    <option>CSE</option>
    <option>IT</option>
    <option>ECE</option>
    <option>EEE</option>
</select>

<br><br>

<label>Hobbies</label><br>

<input type="checkbox"> Reading
<input type="checkbox"> Coding
<input type="checkbox"> Sports
<input type="checkbox"> Music

<br><br>

<label>Address</label><br>

<textarea rows="4" cols="40" placeholder="Enter your address"></textarea>
<label>Upload Profile Photo</label><br>
<input type="file"><br><br>
<br><br>

<label>Password</label><br>
<input type="password" placeholder="Enter password">

<br><br>

<button type="submit">Register</button>

<button type="reset">Reset</button>

</form>

</body>
</html>
